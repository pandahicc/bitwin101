  <main class="container">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 75" width="380" height="63">

</div>
  <p>币胜网 © 2026</p>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const articleId = params.get('id');

      if (!articleId) {
        document.getElementById('article-content').innerHTML = '<p>未找到文章</p>';
        return;
      }

      loadArticles().then(async articles => {
        const article = articles.find(a => a.id === articleId);
        if (!article) {
          document.getElementById('article-content').innerHTML = '<p>未找到文章</p>';
          return;
        }

        document.getElementById('page-title').textContent = article.title + ' - 币胜网';

        // Load full content separately
        const content = await loadArticleContent(articleId);
        if (content === null) {
          document.getElementById('article-content').innerHTML = '<p>加载文章内容失败</p>';
          return;
        }

        const html = `
          <article>
            <div class="article-header">
              <h1>${article.title}</h1>
              <div class="article-meta">
                <span>${article.date}</span>
              </div>
              <div class="tags" style="margin-top: 1rem;">
                ${article.tags.map(tag => `<a href="/tags.html#tag=${encodeURIComponent(tag)}" class="tag">${tag}</a>`).join('')}
              </div>
            </div>
            <div class="article-content">
              ${content}
            </div>
          </article>
        `;
        document.getElementById('article-content').innerHTML = html;
      });
    });
  </script>
</body>
</html>
